<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Music Recommender</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="blob-bg"></div>
    
    <div class="glass-container main-wrapper">
        <header>
            <h1>Recomendador de Música <span class="accent">Inteligente</span></h1>
            <p>Conectando matemáticas complejas y psicología (NLP) con tu música.</p>
        </header>

        <main>
            <div class="search-section">
                <div class="tabs">
                    <button class="tab active" data-mode="nlp">🧠 Mood Textual</button>
                    <button class="tab" data-mode="contenido">🎸 Artista Exacto</button>
                    <button class="tab" data-mode="spotify_import">🟢 Importar Playlist</button>
                </div>
                <div class="spotify-auth-row" style="margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap;">
                    <button id="spotifyConnectBtn">Conectar Spotify</button>
                    <button id="spotifyDisconnectBtn" class="hidden">Desconectar Spotify</button>
                    <span id="spotifyStatusText" style="display:flex;align-items:center;color:#cbd5e1;font-size:0.9rem;"></span>
                </div>
                
                <div class="input-group">
                    <input type="text" id="searchInput" placeholder="Ej: quiero música alegre para el gym sin voces...">
                    <button id="searchBtn">Descubrir</button>
                </div>
            </div>

            <div class="loader-container hidden" id="loader">
                <div class="spinner"></div>
                <p>Calculando Coordenadas del Espacio 9-Dimensional...</p>
            </div>

            <div class="results-wrapper hidden" id="resultsWrapper">
                <div class="chart-container">
                    <canvas id="dnaChart"></canvas>
                </div>
                
                <div class="results-grid-container">
                    <div class="results-header">
                        <span id="resultsSourceBadge" class="results-source-badge hidden"></span>
                        <button id="exportBtn" class="btn-export hidden">🚀 Exportar 15 Recomendaciones a Spotify</button>
                    </div>
                    <div class="results-grid" id="resultsGrid">
                        <!-- Cards inject here -->
                    </div>
                </div>
            </div>
            
            <div class="error-msg hidden" id="errorMsg"></div>
        </main>
    </div>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
